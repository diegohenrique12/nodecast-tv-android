name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Debug APK

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Download Gradle Wrapper JAR
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://repo.maven.apache.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar" \
            || wget -O gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-8.2-bin.zip" \
            || true
          # Use gradle directly if wrapper jar not available
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle assembleDebug --stacktrace
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            ./gradlew assembleDebug --stacktrace --no-daemon
          else
            gradle assembleDebug --stacktrace --no-daemon
          fi
        env:
          GRADLE_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nodecast-tv-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh app/build/outputs/apk/debug/ || echo "APK not found in expected path"
          find app/build -name "*.apk" -exec ls -lh {} \;
